server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /var/www/html/uiogf;
    index index.html index.php;

    # Main UIOGF website
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PHP handler (needed for mailer/send.php) — regex locations take priority
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # Redirect /portal to /portal/
    location = /portal {
        return 301 /portal/;
    }

    # UIOGF portal
    location /portal/ {
        alias /var/www/html/uiogf_portal/;
        index index.html;
        try_files $uri $uri/ /portal/index.html;
    }

    access_log /var/log/nginx/uiogf_access.log;
    error_log /var/log/nginx/uiogf_error.log;
}
